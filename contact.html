<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Play Bae - Contact</title>

<style>
/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BODY */
body {
  font-family: 'Segoe UI', sans-serif;
  background: url('https://static.wixstatic.com/media/6654bc_52db9d3979af4bc2a3cd69174bde8f3d~mv2.webp/v1/fill/w_640,h_482,al_c,q_80,usm_0.66_1.00_0.01,enc_avif,quality_auto/6654bc_52db9d3979af4bc2a3cd69174bde8f3d~mv2.webp');
  color: white;
  background-size: cover;
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 70px 20px;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 50px;
  animation: fadeDown 1s ease;
}

.header h1 {
  font-size: 42px;
  color: #C38E4D;
  letter-spacing: 1px;
}

.header p {
  color: #aaa;
  margin-top: 10px;
}

/* LAYOUT */
.content {
  display: flex;
  gap: 40px;
  flex-wrap: wrap;
}

/* CONTACT INFO */
.contact-info {
  flex: 1;
  min-width: 300px;
}

/* CARD */
.card {
  background: rgba(255, 255, 255, 0.98);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
  transition: 0.4s;
  box-shadow: 0 0 10px rgba(168,85,247,0.2);
  animation: fadeUp 1s ease;
  color:black;
}

.card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: 0 0 20px #C38E4D;
}

/* ICON ALIGN */
.icon {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: bold;
}

/* MAP */
.map {
  flex: 1;
  min-width: 300px;
  border-radius: 15px;
  overflow: hidden;
  animation: fadeUp 1.2s ease;
}

iframe {
  width: 100%;
  height: 100%;
  min-height: 400px;
  border: none;
  filter: grayscale(1) contrast(1.2);
  transition: 0.4s;
  filter: grayscale(0);
}

iframe:hover {
}



/* ANIMATIONS */
@keyframes fadeDown {
  from {opacity: 0; transform: translateY(-30px);}
  to {opacity: 1; transform: translateY(0);}
}

@keyframes fadeUp {
  from {opacity: 0; transform: translateY(40px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>

</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h1>Contact Play Bae 🎮</h1>
    <p>Come visit, play and chill with us</p>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- CONTACT INFO -->
    <div class="contact-info">

      <div class="card">
        <div class="icon">📞 Phone</div>
        <p>
            <a href="tel:+073389 98726" style="color:black; text-decoration:none;">
             +91 73389 98726
            </a>
        </p>
    
        
      </div>
      
  

      <a href="https://instagram.com/playbae" target="_blank" style="text-decoration:none; color:white;">
        <div class="card">
          <div class="icon">
            <!-- Instagram SVG -->
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#a855f7">
              <path d="M7 2C4.2 2 2 4.2 2 7v10c0 2.8 2.2 5 5 5h10c2.8 
              0 5-2.2 5-5V7c0-2.8-2.2-5-5-5H7zm10 
              2c1.7 0 3 1.3 3 3v10c0 1.7-1.3 3-3 
              3H7c-1.7 0-3-1.3-3-3V7c0-1.7 1.3-3 
              3-3h10zm-5 3.5A5.5 5.5 0 1 0 17.5 
              13 5.5 5.5 0 0 0 12 7.5zm0 
              2A3.5 3.5 0 1 1 8.5 13 3.5 3.5 
              0 0 1 12 9.5zm4.75-3.25a1.25 
              1.25 0 1 0 1.25 1.25 1.25 1.25 
              0 0 0-1.25-1.25z"/>
            </svg>
            Instagram
          </div>
          <p>@playbae.cafe</p>
        </div>
      </a>

      <div class="card">
        <div class="icon">📧 Email</div>
        <p>playbae@gmail.com</p>
      </div>

      <div class="card">
        <div class="icon">⏰ Timing</div>
        <p>11 AM – 11 PM</p>
      </div>

    </div>

    <!-- MAP -->
    <div class="map">
      <iframe src="https://www.google.com/maps?q=Play Bae&output=embed"></iframe>
    </div>

  </div>

</div>

</body>
</html>
